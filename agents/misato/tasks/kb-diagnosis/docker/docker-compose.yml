# NERV_IOC Adapter Suite
# Docker Compose for 6 tool adapters
version: '3.8'

services:
  feedparser:
    build:
      context: .
      dockerfile: Dockerfile-feedparser
    image: nerv-adapter-feedparser:latest
    network: none
    read_only: true

  apprise:
    build:
      context: .
      dockerfile: Dockerfile-apprise
    image: nerv-adapter-apprise:latest
    network: none
    read_only: true

  argosctranslate:
    build:
      context: .
      dockerfile: Dockerfile-argosctranslate
    image: nerv-adapter-argosctranslate:latest
    network: none
    read_only: true

  libretranslate:
    build:
      context: .
      dockerfile: Dockerfile-libretranslate
    image: nerv-adapter-libretranslate:latest
    network: none
    read_only: true

  lancedb:
    build:
      context: .
      dockerfile: Dockerfile-lancedb
    image: nerv-adapter-lancedb:latest
    network: none
    read_only: true

  qwen3vl:
    build:
      context: .
      dockerfile: Dockerfile-qwen3vl
    image: nerv-adapter-qwen3vl:latest
    network: none
    read_only: true
